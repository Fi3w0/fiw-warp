# Gradle
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
# IntelliJ IDEA is not yet fully compatible with the configuration cache.
org.gradle.configuration-cache=false

# Minecraft / mappings (Mojang official mappings)
minecraft_version=1.21.11

# Build tooling
loom_version=1.16-SNAPSHOT
moddev_version=2.0.141
kotlin_version=2.4.0

# Fabric
fabric_loader_version=0.19.3
fabric_api_version=0.141.4+1.21.11
fabric_kotlin_version=1.13.12+kotlin.2.4.0

# NeoForge
neoforge_version=21.11.42
kotlin_for_forge_version=6.1.0

# Mod
# mod_id is used as the loader mod identifier (NeoForge forbids hyphens, so no dash here).
mod_id=fiwwarp
# archives_name is the file name of the built jars (dashes are fine here).
archives_name=fiw-warp
mod_name=Fiw Warp
mod_version=1.1.0
maven_group=com.fiw
