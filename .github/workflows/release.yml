name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN_SET: ${{ secrets.MODRINTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ ("\\[" ver "\\]")) { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION (expected a '## [$VERSION] - ...' heading)"
            exit 1
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar

      - name: Publish to Modrinth (Fabric)
        if: ${{ env.MODRINTH_TOKEN_SET == 'true' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: fiw-warp
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: fabric/build/libs/!(*-@(dev|sources|javadoc)).jar
          name: Fiw Warp ${{ github.ref_name }} (Fabric)
          version: ${{ github.ref_name }}
          version-type: release
          loaders: |
            fabric
          game-versions: |
            1.21.11
          changelog: ${{ steps.changelog.outputs.notes }}
          dependencies: |
            fabric-api(required){modrinth:fabric-api}
            fabric-language-kotlin(required){modrinth:fabric-language-kotlin}

      - name: Publish to Modrinth (NeoForge)
        if: ${{ env.MODRINTH_TOKEN_SET == 'true' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: fiw-warp
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: neoforge/build/libs/!(*-@(dev|sources|javadoc)).jar
          name: Fiw Warp ${{ github.ref_name }} (NeoForge)
          version: ${{ github.ref_name }}
          version-type: release
          loaders: |
            neoforge
          game-versions: |
            1.21.11
          changelog: ${{ steps.changelog.outputs.notes }}
          dependencies: |
            kotlin-for-forge(required){modrinth:kotlin-for-forge}
